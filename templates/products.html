<!DOCTYPE html>
<html lang="ru">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2.0">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="{{ url_for('static', filename='js/products.js') }}?v=2.0"></script>
<script src="{{ url_for('static', filename='js/jquery.noisy.js') }}?v=2.0"></script>
<script src="{{ url_for('static', filename='js/preloader.js') }}?v=2.0"></script>

<head>
    <meta charset="UTF-8">
    <title>Fabled Bazaar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/fav/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/static/fav//favicon.svg" />
    <link rel="shortcut icon" href="/static/fav//favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/fav//apple-touch-icon.png" />
    <link rel="manifest" href="/static/fav//site.webmanifest" />

    <!-- Yandex.Metrika counter -->
    <script type="text/javascript">
        (function (m, e, t, r, i, k, a) {
            m[i] = m[i]function() { (m[i].a = m[i].a[]).push(arguments) };
            m[i].l = 1 * new Date();
            for (var j = 0; j < document.scripts.length; j++) { if (document.scripts[j].src === r) { return; } }
            k = e.createElement(t), a = e.getElementsByTagName(t)[0], k.async = 1, k.src = r, a.parentNode.insertBefore(k, a)
        })(window, document, 'script', 'https://mc.yandex.ru/metrika/tag.js?id=104250730', 'ym');

        ym(104250730, 'init', { ssr: true, webvisor: true, clickmap: true, ecommerce: "dataLayer", accurateTrackBounce: true, trackLinks: true });
    </script>
    <noscript>
        <div><img src="https://mc.yandex.ru/watch/104250730" style="position:absolute; left:-9999px;" alt="" /></div>
    </noscript>
    <!-- /Yandex.Metrika counter -->
</head>

<body>
    <!-- Preloader -->
    <div class="preloader">
        <img src="/static/icons/reptile.svg" class="letter X loader-icon">
    </div>



    <h2 class="coll-name goudy"></h2>
    <p class="coll-desc goudy"></p>

    {% block content %}
    <div class="card-item-container"></div>

    {% include 'header.html' %}

    {% include 'menu.html' %}

    <div class="shop-grid">
        {% for item in products %}
        <article data-id="{{ item.sku }}" data-collection="{{ item.collection }}" class="shop-item">
            <img class="item-img-blur"
                src="{{ url_for('static', filename='img/' + item.sku + '/' + item.sku + '-main.webp') }}" alt=""
                srcset="">
            <img class="item-img"
                src="{{ url_for('static', filename='img/' + item.sku + '/' + item.sku + '-main.webp') }}" alt=""
                srcset="">
            <p class="item-name center goudy">{{ item.name }}</p>
        </article>

        {% endfor %}

    </div>
    <div class="fixed">
        <div id="product-detail" class="card-item-container">
        </div>
    </div>

    <div id="modal-overlay" style="display:none;">
        <button id="modal-close" class="modal-btn exit"></button>
        <button id="prev-modal" class="modal-btn carousel-arrow"><img
                src="{{ url_for('static', filename='icons/arrow_small.svg') }}" alt="" srcset=""></button>
        <img id="modal-image" src="" alt="Просмотр фото">
        <button id="next-modal" class="modal-btn carousel-arrow"><img
                src="{{ url_for('static', filename='icons/arrow_small.svg') }}" alt="" srcset=""></button>
    </div>
    <div id="background_blocker" style="display: none;"></div>
    {% endblock %}

    <div id="custom-cursor" class="cursor-default">
        <img src="/static/icons/cursor.svg" alt="Custom Cursor">
    </div>


    <script type="module" src="/static/js/shopManager.js"></script>
    <script src="/static/js/noise.js"></script>
    <script src="/static/js/cursor.js"></script>
</body>

</html>
